<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MegaStore</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div class="card">
        <h2>Upload Files to Database MegaStore</h2>
        <p>Select the file CSV</p>
        <form id="uploadForm">
            <input type="file" name="archivo" accept=".csv" required>
            <button type="submit">Start</button>
        </form>
        <div id="mensaje"></div>
    </div>
</body>
</html>
